<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f4f7f5" />
    <meta
      name="description"
      content="Weekly Class Schedule｜週一到週五的每月課表"
    />
    <title>Weekly Class Schedule</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <main class="page-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">WEEKLY CLASS SCHEDULE</p>
          <h1 id="month-title">本月課表</h1>
          <p class="subtitle">週一至週五，讓每一天都一目了然。</p>
        </div>

        <div class="today-chip" aria-label="今天日期">
          <span>今天</span>
          <strong id="today-label"></strong>
        </div>
      </header>

      <section class="legend" aria-label="課表狀態說明">
        <span><i class="dot dot-today"></i>今天</span>
        <span><i class="dot dot-upcoming"></i>即將到來</span>
        <span><i class="dot dot-past"></i>已結束</span>
      </section>

      <section>
        <div id="schedule" class="schedule" aria-live="polite"></div>

        <div id="empty-state" class="empty-state" hidden>
          <span>☕</span>
          <h2>這個月還沒有課程</h2>
          <p>在 script.js 的 classes 陣列加入課程即可。</p>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
